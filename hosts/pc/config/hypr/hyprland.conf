



{
  monitorv2 {
        output = "DP-3"
        mode = "2560x1440@180"
        position = "0x0"
        scale = 1
        bitdepth = 10
        cm = "hdredid"
        sdrbrightness = 1.22
        sdrsaturation = 1
  }

  monitorv2 {
        output = "HDMI-A-1"
        mode = "1920x1080@120"
        position = "2560x300"
        scale = 1
        bitdepth = 8
        cm = "auto"
  }

  monitorv2 {
        output = "DP-2"
        mode = "3840x1100@60"
        position = "-2560x300"
        scale = 1
        bitdepth = 8
        cm = "auto"
	transform = 1  # rotate 90° counterclockwise
  }

    workspace = [
      "2, monitor:DP-3"
      "1, monitor:HDMI-A-1"
      "3, monitor:DP-2"
    ]

    input = {
      touchdevice = {
        output = "DP-2"
      }
  }
}
